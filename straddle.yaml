# iface-espnow — RNS-over-ESPnow transport for reticulous.
#
# Bridges RNS packets over Espressif's connectionless ESP-NOW link using
# the chip's long-range PHY. Single broadcast peer; one RNS packet = one
# ESP-NOW v2 frame, no on-air framing. Brings the WiFi radio up itself —
# no IP stack required (spangap-net is *not* a transitive dep).
schema_version: 1
name: reticulous/iface-espnow
prefix: rns_espnow
version: 0.1.0
firmware: esp-idf
browser: browser
platforms: [idf]
requires:
  - reticulous/rns
  # Plan says espnow needs no IP stack, but today's code still pulls in
  # net.h for netIsUp() and NET_EV_UP/DOWN subscription. Add spangap-net
  # until the espnow task is reworked to own the radio independently.
  - spangap/spangap-net
# Auto-init: folded into the generated spangapInitStraddles() dispatcher.
# espnowInit() self-registers with rnsd via ITS; `requires: reticulous/rns` puts
# rnsd ahead of it in dependency-topo order, so its port surface is up first.
init:
  - call: espnowInit

# Browser-side UI registration (parallel to init: above) — auto-wired into
# the buildable SPA via straddles.gen.ts; no web-interface edit needed.
browser_register:
  - call: registerEspnow
    module: modules/espnow

# Declarative settings: LCD pane + storage defaults generated from this block.
# web: false — the rich EspnowPanel.vue (conflict banner, radio-group policy with
# long labels, IFAC secret, status lines) keeps owning the web leaf.
settings:
  - menu:
      - { id: mesh, label: "Mesh Network", placement: 3 }
      - { id: interfaces, label: "RNS Interfaces", placement: 2 }
      - { id: espnow, label: "ESPnow" }
    web: false
    rows:
      - section: "ESPnow"
      - switch: { label: "Enable", key: "s.espnow.enable", default: 0 }
      - dropdown:
          label: "WiFi channel"
          key: "s.espnow.channel"
          default: 1
          options:
            - { v: 1,  l: "1" }
            - { v: 2,  l: "2" }
            - { v: 3,  l: "3" }
            - { v: 4,  l: "4" }
            - { v: 5,  l: "5" }
            - { v: 6,  l: "6" }
            - { v: 7,  l: "7" }
            - { v: 8,  l: "8" }
            - { v: 9,  l: "9" }
            - { v: 10, l: "10" }
            - { v: 11, l: "11" }
            - { v: 12, l: "12" }
            - { v: 13, l: "13" }
      - dropdown:
          label: "Rate"
          key: "s.espnow.rate"
          default: "250k"
          options:
            - { v: "250k", l: "250k" }
            - { v: "500k", l: "500k" }
      - dropdown:
          label: "On conflict"
          key: "s.espnow.conflict_policy"
          default: "disable"
          options:
            - { v: "disable", l: "Disable" }
            - { v: "stay",    l: "Stay" }
      - section: "Status"
      - value: { label: "State", key: "espnow.state" }
      - value: { label: "Channel", key: "espnow.channel_eff" }
